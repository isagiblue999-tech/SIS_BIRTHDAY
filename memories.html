<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sister - Memories</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="preloader">
        <div class="loader"></div>
    </div>
    <div class="cursor"></div>
    <div class="cursor-follower"></div>
    <div class="transition-overlay"></div>
    
    <audio id="bg-music" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3?filename=happy-birthday-to-you-bossa-nova-11134.mp3" type="audio/mpeg">
    </audio>
    <button id="music-toggle" class="glass-btn">🎵 Play</button>

    <main id="content" data-page="memories">
        <section class="memories-section">
            <h2 class="section-title">Precious Memories</h2>
            <div class="gallery-container">
                <div class="slider">
                    <div class="slide"><img src="https://images.unsplash.com/photo-1511895426328-dc8714191300?q=80&w=800&auto=format&fit=crop" alt="Memory 1"></div>
                    <div class="slide"><img src="https://images.unsplash.com/photo-1529333166437-7750a6dd5a70?q=80&w=800&auto=format&fit=crop" alt="Memory 2"></div>
                    <div class="slide"><img src="https://images.unsplash.com/photo-1542038784456-1ea8e935640e?q=80&w=800&auto=format&fit=crop" alt="Memory 3"></div>
                    <div class="slide"><img src="https://images.unsplash.com/photo-1602045486350-4e53a69865c6?q=80&w=800&auto=format&fit=crop" alt="Memory 4"></div>
                </div>
                <div class="controls">
                    <button class="glass-btn prev-btn">&lt;</button>
                    <button class="glass-btn next-btn">&gt;</button>
                </div>
            </div>
            <div class="grid-gallery">
                <img src="https://images.unsplash.com/photo-1511895426328-dc8714191300?q=80&w=400&auto=format&fit=crop" class="gallery-img">
                <img src="https://images.unsplash.com/photo-1529333166437-7750a6dd5a70?q=80&w=400&auto=format&fit=crop" class="gallery-img">
                <img src="https://images.unsplash.com/photo-1542038784456-1ea8e935640e?q=80&w=400&auto=format&fit=crop" class="gallery-img">
                <img src="https://images.unsplash.com/photo-1602045486350-4e53a69865c6?q=80&w=400&auto=format&fit=crop" class="gallery-img">
            </div>
            <a href="./story.html" class="next-page-btn glass-btn glow-effect">Our Story ➔</a>
        </section>
        <div class="lightbox">
            <div class="lightbox-content">
                <img src="" alt="Lightbox">
                <button class="close-lightbox">&times;</button>
            </div>
        </div>
    </main>

    <script src="./script.js"></script>
</body>
</html>
